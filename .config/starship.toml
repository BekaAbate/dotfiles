format = """
[тФМтФАтФА](#828bb8 bold)[\\(](#828bb8 bold)$username[@](cyan bold)$hostname[\\)](#828bb8 bold)$localip\
$shlvl\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$package\
$c\
$cmake\
$deno\
$lua\
$nodejs\
$python\
$aws\
$azure\
$direnv\
$env_var\
$cmd_duration\
$jobs\
$time\
$status\
$os\
$container\
$netns\
$shell\
$line_break\
[тФФтФАтФАяЕХ ](#828bb8 bold)
"""

# ~/.config/starship.toml
add_newline = false

# Increase time out for commands
scan_timeout = 3000
command_timeout = 8000

[directory]
format = '[\[$path\]]($style)[$read_only]($read_only_style) '
truncation_length = 3
truncation_symbol = 'тАж'

[username]
show_always = true
format = "[$user](cyan bold)"

[hostname]
ssh_only = false
format = "[$hostname](cyan bold)"
